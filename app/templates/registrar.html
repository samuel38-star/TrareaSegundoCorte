<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Registrar Paciente</title>

    <link rel="stylesheet" href="/static/estilos.css">

</head>

<body>

    <div class="contenedor">

        <h1>Registrar Paciente</h1>

        <div class="formulario">

            <form action="/guardar" method="post">

                <label>Nombre:</label>

                <input
                    type="text"
                    name="nombre"
                    required
                >

                <label>Enfermedad:</label>

                <input
                    type="text"
                    name="enfermedad"
                    required
                >

                <label>Prioridad:</label>

                <select name="prioridad">

                    <option value="1">
                        1 - Urgente
                    </option>

                    <option value="2">
                        2 - Media
                    </option>

                    <option value="3">
                        3 - Baja
                    </option>

                </select>

                <br>

                <button type="submit">
                    Registrar
                </button>

            </form>

            {% if mensaje %}

                <p class="mensaje">
                    {{ mensaje }}
                </p>

            {% endif %}

        </div>

        <br>

        <a href="/">
            <button>Volver al Inicio</button>
        </a>

    </div>

</body>

</html>
