<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Inventario de Productos</h1>

<table>
    <thead>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Valor Unidad</th>
            <th>Existencias</th>
            <th>Valor Total</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.codigo }}</td>
            <td>{{ p.nombre }}</td>
            <td>{{ p.valoru }}</td>
            <td>{{ p.existencias }}</td>
            <td>{{ p.valor_total }}</td>
            <td>{{ p.estado }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
